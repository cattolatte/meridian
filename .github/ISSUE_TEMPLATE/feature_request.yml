name: Feature request
description: Propose an enhancement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation or need motivates this?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Roadmap fit
      description: Meridian is built in strictly ordered phases. Where does this belong?
      options:
        - Current phase
        - A later planned phase
        - Not on the roadmap (new scope — may require an ADR)
    validations:
      required: true
