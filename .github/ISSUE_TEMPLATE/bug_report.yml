name: Bug report
description: Something is broken or behaves incorrectly
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal commands or code to reproduce the problem.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Meridian version
      placeholder: "0.0.1"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Python 3.12, macOS 15, arm64"
    validations:
      required: true
