# Meridian demo stack: API + static demo UI (+ Postgres for the Phase-10 store swap).
# `docker compose up` -> API on :8000, demo UI on :8080. Not medical advice.
services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - meridian-data:/data

  ui:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./demo:/usr/share/nginx/html:ro
    depends_on:
      - api

  # The document store is SQLite today; Postgres is the Phase-10 swap target
  # (behind the DocumentStore protocol). Included for the eventual migration.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: meridian
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: meridian
    volumes:
      - meridian-pg:/var/lib/postgresql/data
    profiles: ["postgres"]

volumes:
  meridian-data:
  meridian-pg:
